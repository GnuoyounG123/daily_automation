<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今日计划 - 2026年04月11日</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .greeting {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .date {
            font-size: 18px;
            opacity: 0.9;
            margin-bottom: 15px;
        }

        .encouragement {
            background: rgba(255,255,255,0.2);
            border-radius: 15px;
            padding: 15px 20px;
            font-size: 14px;
            line-height: 1.6;
            margin-top: 20px;
            font-style: italic;
        }

        .content {
            padding: 30px;
        }

        .section {
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-icon {
            font-size: 24px;
        }

        .course-item {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            gap: 15px;
            align-items: center;
            border-left: 4px solid #667eea;
        }

        .course-time {
            background: #667eea;
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            white-space: nowrap;
        }

        .course-info {
            flex: 1;
        }

        .course-name {
            font-size: 16px;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .course-location {
            font-size: 13px;
            color: #666;
        }

        .task-item {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 10px;
            border-left: 4px solid #28a745;
        }

        .task-item.priority-high {
            border-left-color: #dc3545;
            background: #fff5f5;
        }

        .task-item.priority-medium {
            border-left-color: #ffc107;
            background: #fffbf0;
        }

        .task-item.priority-low {
            border-left-color: #28a745;
        }

        .task-content {
            font-size: 15px;
            color: #333;
            margin-bottom: 5px;
        }

        .task-meta {
            font-size: 12px;
            color: #888;
        }

        .empty {
            text-align: center;
            color: #999;
            padding: 30px;
            font-style: italic;
        }

        .footer {
            background: #f8f9fa;
            padding: 20px 30px;
            text-align: center;
            color: #666;
            font-size: 13px;
        }

        .footer .heart {
            color: #e74c3c;
        }

        .quote {
            margin-top: 10px;
            font-style: italic;
            color: #888;
        }

        @media (max-width: 600px) {
            body {
                padding: 10px;
            }

            .header {
                padding: 30px 20px;
            }

            .greeting {
                font-size: 24px;
            }

            .content {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="greeting">早上好，记得慢慢来，不着急的</div>
            <div class="date">2026年04月11日 · 周六</div>
            <div class="encouragement">"今天天气可能有点凉，记得带件外套。"</div>
        </div>

        <div class="content">
            <div class="section">
                <div class="section-title">
                    <span class="section-icon">📚</span>
                    今日课程
                </div>
                <div class="empty">今天没有课程，可以自由安排学习时间～</div>
            </div>

            <div class="section">
                <div class="section-title">
                    <span class="section-icon">✨</span>
                    今日任务
                </div>
                
            <div class="task-item">
                <div class="task-content">🔥 线性代数复习<br><span style='color:#888;font-size:13px;'>💡 2小时，继续巩固重点难点</span></div>
            </div>
            
            <div class="task-item">
                <div class="task-content">📚 微积分复习<br><span style='color:#888;font-size:13px;'>💡 2小时大量复习</span></div>
            </div>
            
            <div class="task-item">
                <div class="task-content">🏃 跑步<br><span style='color:#888;font-size:13px;'>💡 周末运动放松</span></div>
            </div>
            
            </div>
        </div>

        <div class="footer">
            <p>喵一直在这里陪着您 <span class="heart">♥</span></p>
            <p class="quote">"今天也要记得对自己好一点，其他的都不急。"</p>
        </div>
    </div>
</body>
</html>
