name: Bug report
description: Report a reproducible problem or regression
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail for someone to reproduce it without access to your local secrets, email account, or API keys.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: The web UI crashes when generating the daily briefing...
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Web UI
        - Backend workflow
        - Configuration
        - Schedule and reminders
        - Email delivery
        - Fetching and parsing
        - Academic APIs
        - Packaging and installer
        - Documentation
        - Unknown
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps, commands, or UI actions.
      placeholder: |
        1. Run `python launcher.py web`
        2. Open `http://localhost:8501`
        3. Click ...
        4. See ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: The briefing should be generated and saved under `runtime_local/data/`.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: The app shows an exception / exits / writes output to the wrong path.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs, traceback, or screenshots
      description: Remove secrets, email addresses, API keys, and local private data before posting.
      render: shell

  - type: input
    id: python_version
    attributes:
      label: Python version
      placeholder: "3.10.13"

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Windows 11 / macOS 15 / Ubuntu 24.04"

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submit checks
      options:
        - label: I removed secrets, API keys, email addresses, and private schedule data from this issue.
          required: true
        - label: I checked whether this behavior is already documented in README or docs.
          required: false
        - label: I can reproduce this issue more than once.
          required: false
